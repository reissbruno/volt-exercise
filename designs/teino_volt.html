document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ent-soft:color-mix(in srgb,var(--accent) 15%,transparent);}\n    ::-webkit-scrollbar{width:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px;border:2px solid #080809}\n    @keyframes voltPop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100dvh;width:100%;font-family:Manrope,system-ui,sans-serif;background:radial-gradient(120% 55% at 50% -5%, color-mix(in srgb,var(--accent) 9%, transparent), transparent 55%), #080809;color:#F3F3F4;\">\n\n  <header style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px clamp(16px,3vw,32px);background:rgba(10,10,12,.78);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);\">\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"var(--accent)\"><path d=\"M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-family:Anton,sans-serif;font-size:22px;letter-spacing:.04em;color:#F7F7F6;line-height:1;\">VOLT<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"display:flex;align-items:center;gap:4px;padding:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;\">\n      <button style=\"height:38px;padding:0 16px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;background:transparent;color:#9A9AA0;\">Exercícios<\u002Fbutton>\n      <button style=\"height:38px;padding:0 16px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;background:transparent;color:#9A9AA0;\">Meus Planos<\u002Fbutton>\n      <button style=\"height:38px;padding:0 16px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;background:rgba(255,255,255,.1);color:#fff;\">Treino<\u002Fbutton>\n    <\u002Fnav>\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n pointer;display:flex;align-items:center;justify-content:center;line-height:1;\" style-hover=\"background:rgba(255,255,255,.06);\">−<\u002Fbutton>\n                        <span style=\"min-width:18px;text-align:center;font:800 17px Manrope;color:#F2F2F4;\">{{ ex.sets }}<\u002Fspan>\n                        <button onclick=\"{{ ex.incSets }}\" aria-label=\"mais\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);background:var(--accent-soft);color:var(--accent-strong);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;\" style-hover=\"filter:brightness(1.1);\">+<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"flex:1 1 150px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);\">\n                      <span style=\"color:#9A9AA0;font:700 12px Manrope;text-transform:uppercase;letter-spacing:.05em;\">Reps<\u002Fspan>\n                      <div style=\"display:flex;align-items:center;gap:12px;\">\n                        <button onclick=\"{{ ex.decReps }}\" aria-label=\"menos\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#D4D4D8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;\" style-hover=\"background:rgba(255,255,255,.06);\">−<\u002Fbutton>\n                        <span style=\"min-width:22px;text-align:center;font:800 17px Manrope;color:#F2F2F4;\">{{ ex.reps }}<\u002Fspan>\n                        <button onclick=\"{{ ex.incReps }}\" aria-label=\"mais\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#D4D4D8;font-size:18px;cursor:pointer;display:flex;align-items:center;jus \n    <sc-if value=\"{{ isActive }}\">\n      <div>\n        <!-- progress -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;\">\n          <button onclick=\"{{ endWorkout }}\" style=\"display:flex;align-items:center;gap:6px;background:none;border:none;color:#9A9AA0;font:600 13.5px Manrope;cursor:pointer;\" style-hover=\"color:#F87171;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>Encerrar<\u002Fbutton>\n          <span style=\"color:#9A9AA0;font:700 13px Manrope;\">{{ sessionTimeText }} · {{ completedAll }}/{{ totalAll }} séries<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin-bottom:22px;\"><div style=\"height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent-strong),var(--accent-deep));width:{{ progressPct }};transition:width .3s;\"><\u002Fdiv><\u002Fdiv>\n\n        <!-- TIMER -->\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 20px;border-radius:24px;background:linear-gradient(180deg,#161618,#0F0F11);border:1px solid {{ timerBorder }};\">\n          <span style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;background:{{ modeBg }};color:{{ modeColor }};font:800 12.5px Manrope;letter-spacing:.04em;text-transform:uppercase;\">{{ modeLabel }}<\u002Fspan>\n          <h2 style=\"margin:14px 0 2px;font:800 20px Manrope;color:#F7F7F6;text-transform:capitalize;\">{{ curName }}<\u002Fh2>\n          <p style=\"margin:0;color:#9A9AA0;font-size:13.5px;\">{{ subLabel }}<\u002Fp>\n\n          <div style=\"position:relative;width:230px;height:230px;margin:18px 0 8px;\">\n            <svg width=\"230\" height=\"230\" viewBox=\"0 0 230 230\" style=\"position:absolute;inset:0;\">\n              <circle cx=\"115\" cy=\"115\" r=\"100\" fill=\"none\" stroke=\"rgba(255,255,255,.07)\" stroke-width=\"11\"><\u002Fcircle>\n              <circle cx=\"115\" cy=\"115\" r=\"100\" fill=\"none\" stroke=\"{{ modeColor }}\" stroke-width=\"11\" stroke-linecap=\"round\" transform=\"rotate(-90 115 115)\" stroke-dasharray=\"628\" stroke-dashoffset=\"{{ ringOffset }}\" style=\"transition:stroke-dashoffset .9s linear;\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n              <span style=\"font-family:Anton,sans-serif;font-size:54px;color:#F7F7F6;line-height:1;letter-spacing:.01em;\">{{ timerText }}<\u002Fspan>\n              <span style=\"margin-top:6px;color:#7C7C82;font:700 12px Manrope;text-transform:uppercase;letter-spacing:.06em;\">{{ timerCaption }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:10px;width:100%;max-width:380px;margin-top:6px;\">\n            <button onclick=\"{{ onToggleRun }}\" style=\"flex:1;height:52px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#EDEDED;font:700 15px Manrope;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;\" style-hover=\"background:rgba(255,255,255,.05);\">{{ runLabel }}<\u002Fbutton>\n            <sc-if value=\"{{ isWork }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ onCompleteSet }}\" style=\"flex:1.4;height:52px;border-radius:13px;border:none;color:#fff;font:800 15px Manrope;cursor:pointer;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 30px -12px color-mix(in srgb,var(--accent) 65%,transparent);\" style-hover=\"filter:brightness(1.06);\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Concluir série<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isRest }}\">\n              <button onclick=\"{{ onAddRest }}\" style=\"flex:1;height:52px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#EDEDED;font:700 15px Manrope;cursor:pointer;\">+15s<\u002Fbutton>\n              <button onclick=\"{{ onSkipRest }}\" style=\"flex:1.2;height:52px;border-radius:13px;border:none;color:#fff;font:800 15px Manrope;cursor:pointer;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));display:flex;align-items:center;justify-content:center;gap:7px;\" style-hover=\"filter:brightness(1.06);\">Pular<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M5 4l10 8-10 8zM17 5h3v14h-3z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- set dots for current exercise -->\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;\">\n          <sc-for list=\"{{ curSetDots }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <span style=\"width:34px;height:8px;border-radius:999px;background:{{ s.bg }};transition:background .2s;\"><\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- exercise list mini -->\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:24px;\">\n          <sc-for list=\"{{ miniList }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:{{ m.bg }};border:1px solid {{ m.border }};\">\n              <span style=\"flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:{{ m.iconBg }};color:{{ m.iconColor }};\">{{ m.icon }}<\u002Fspan>\n              <span style=\"flex:1;min-width:0;font:600 14px Manrope;color:{{ m.nameColor }};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ m.name }}<\u002Fspan>\n              <span style=\"color:#8A8A90;font:700 13px Manrope;\">{{ m.progress }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== DONE ===== -->\n    <sc-if value=\"{{ isDone }}\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 20px;animation:voltPop .4s ease both;\">\n        <span style=\"width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#22C55E,#16A34A);box-shadow:0 18px 44px -14px rgba(34,197,94,.6);\"><svg width=\"48\" height=\"48\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h1 style=\"margin:22px 0 0;font:800 28px Manrope;letter-spacing:-.02em;color:#F7F7F6;\">Treino concluído!<\u002Fh1>\n        <p style=\"margin:8px 0 0;color:#9A9AA0;font-size:15px;\">Mandou bem, Bruno. Bora repetir amanhã.<\u002Fp>\n        <div style=\"display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center;\">\n          <div style=\"padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);\"><div style=\"font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;\">{{ doneSets }}<\u002Fdiv><div style=\"color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;\">séries<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);\"><div style=\"font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;\">{{ doneExs }}<\u002Fdiv><div style=\"color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;\">exercícios<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);\"><div style=\"font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;\">{{ doneTime }}<\u002Fdiv><div style=\"color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;\">tempo<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ endWorkout }}\" style=\"margin-top:30px;height:52px;padding:0 28px;border:none;border-radius:14px;cursor:pointer;color:#fff;font:800 15.5px Manrope;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));box-shadow:0 14px 36px -12px color-mix(in srgb,var(--accent) 65%,transparent);\" style-hover=\"filter:brightness(1.06);\">Finalizar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F0531C&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#F0531C&quot;,&quot;#16E0A3&quot;,&quot;#2E7BFF&quot;,&quot;#FF3B30&quot;],&quot;section&quot;:&quot;Aparência&quot;}}\">\nclass Component extends DCLogic {\n  GROUPS = {\n    core:{color:'#F0531C',soft:'rgba(240,83,28,.14)',part:'Abdômen'},\n    back:{color:'#3B82F6',soft:'rgba(59,130,246,.15)',part:'Costas'},\n    chest:{color:'#10B981',soft:'rgba(16,185,129,.15)',part:'Peito'},\n    legs:{color:'#A78BFA',soft:'rgba(167,139,250,.16)',part:'Pernas'},\n    arms:{color:'#F472B6',soft:'rgba(244,114,182,.16)',part:'Braços'},\n  };\n  EX = {\n    1:{name:'3/4 sit-up',group:'core'}, 2:{name:'45° side bend',group:'core'},\n    5:{name:'alternate lateral pulldown',group:'back'}, 6:{name:'assisted chest dip (kneeling)',group:'chest'},\n    12:{name:'assisted parallel close grip pull-up',group:'back'}, 18:{name:'barbell pullover to press',group:'back'},\n    19:{name:'barbell alternate biceps curl',group:'arms'}, 20:{name:'barbell bench front squat',group:'legs'},\n    21:{name:'barbell bench press',group:'chest'},\n  };\n  PLAN = { seg:[1,5,21], ter:[], qua:[20,12,19], qui:[], sex:[2,6,18], sab:[], dom:[] };\n  DAYS = [{key:'seg',label:'Seg'},{key:'ter',label:'Ter'},{key:'qua',label:'Qua'},{key:'qui',label:'Qui'},{key:'sex',label:'Sex'},{key:'sab',label:'Sáb'},{key:'dom',label:'Dom'}];\n\n  state = { day:'seg', sets:{}, reps:{}, rest:60,\n    started:false, mode:'idle', running:false, curIdx:0, curSet:1, elapsed:0, restLeft:0, sessionSecs:0, done:{} };\n\n  componentDidMount(){ if(this.props.accent) document.documentElement.style.setProperty('--accent',this.props.accent); this._tid=setInterval(()=>this.tick(),1000); }\n  componentWillUnmount(){ clearInterval(this._tid); }\n\n  getSets(id){ return this.state.sets[id] ?? 3; }\n  getReps(id){ return this.state.reps[id] ?? 12; }\n  fmt(s){ const m=Math.floor(s/60), x=s%60; return m+':'+String(x).padStart(2,'0'); }\n\n  tick(){ this.setState(s=>{\n    if(!s.started || s.mode==='done' || !s.running) return null;\n    if(s.mode==='work') return { elapsed:s.elapsed+1, sessionSecs:s.sessionSecs+1 };\n    if(s.mode==='rest'){ const rl=s.restLeft-1; if(rl<=0) return Object.assign({sessionSecs:s.sessionSecs+1}, this.advance(s)); return { restLeft:rl, sessionSecs:s.sessionSecs+1 }; }\n    return null;\n  }); }\n  advance(s){ const day=this.PLAN[s.day]; const id=day[s.curIdx]; let idx=s.curIdx, set=s.curSet;\n    if(s.curSet < this.getSets(id)) set=s.curSet+1; else { idx=s.curIdx+1; set=1; }\n    return { mode:'work', elapsed:0, running:true, curIdx:idx, curSet:set }; }\n\n  incSets(id){ this.setState(s=>({sets:{...s.sets,[id]:Math.min(this.getSets(id)+1,6)}})); }\n  decSets(id){ this.setState(s=>({sets:{...s.sets,[id]:Math.max(this.getSets(id)-1,1)}})); }\n  incReps(id){ this.setState(s=>({reps:{...s.reps,[id]:Math.min(this.getReps(id)+1,30)}})); }\n  decReps(id){ this.setState(s=>({reps:{...s.reps,[id]:Math.max(this.getReps(id)-1,1)}})); }\n\n  completeSet(){ this.setState(s=>{ const day=this.PLAN[s.day]; const id=day[s.curIdx];\n    const done={...s.done,[id+'-'+s.curSet]:true};\n    const lastSet = s.curSet >= this.getSets(id); const lastEx = s.curIdx >= day.length-1;\n    if(lastSet && lastEx) return { done, mode:'done', running:false };\n    return { done, mode:'rest', restLeft:s.rest, running:true };\n  }); }\n\n  renderVals(){\n    const s=this.state, G=this.GROUPS;\n    const day=this.PLAN[s.day];\n    const dayExArr = day.map((id,i)=>({id, i, ...this.EX[id], g:G[this.EX[id].group]}));\n    const totalSets = day.reduce((a,id)=>a+this.getSets(id),0);\n    const completedAll = Object.keys(s.done).length;\n    const dot = (k)=> this.PLAN[k].length>0 ? 'var(--accent)' : 'rgba(255,255,255,.18)';\n\n    const base = {\n      isSetup: !s.started, isActive: s.started && s.mode!=='done', isDone: s.mode==='done',\n      dayTabs: this.DAYS.map(d=>({ label:d.label, dot:dot(d.key),\n        bg:d.key===s.day?'var(--accent-soft)':'rgba(255,255,255,.04)', border:d.key===s.day?'color-mix(in srgb,var(--accent) 40%,transparent)':'rgba(255,255,255,.08)', color:d.key===s.day?'var(--accent-strong)':'#C4C4C8',\n        onClick:()=>this.setState({day:d.key}) })),\n    };\n\n    if(base.isSetup){\n      const estMin = Math.max(1, Math.round(totalSets*(45+s.rest)/60));\n      return Object.assign(base, {\n        dayHasWorkout: day.length>0, dayEmpty: day.length===0,\n        exCount: day.length, totalSets, estMin,\n        restOpts: [30,45,60,90].map(v=>({ label:v+'s', bg:v===s.rest?'var(--accent-soft)':'transparent', color:v===s.rest?'var(--accent-strong)':'#B6B6BC', border:v===s.rest?'color-mix(in srgb,var(--accent) 38%,transparent)':'rgba(255,255,255,.1)', onClick:()=>this.setState({rest:v}) })),\n        exercises: dayExArr.map(e=>({ num:e.i+1, name:e.name, color:e.g.color, soft:e.g.soft, part:e.g.part,\n          sets:this.getSets(e.id), reps:this.getReps(e.id),\n          incSets:()=>this.incSets(e.id), decSets:()=>this.decSets(e.id), incReps:()=>this.incReps(e.id), decReps:()=>this.decReps(e.id) })),\n        startWorkout: ()=>this.setState({ started:true, mode:'work', running:true, curIdx:0, curSet:1, elapsed:0, sessionSecs:0, done:{} }),\n      });\n    }\n\n    if(base.isActive){\n      const id=day[s.curIdx], e=this.EX[id], g=G[e.group];\n      const total=this.getSets(id), isWork=s.mode==='work', isRest=s.mode==='rest';\n      const circ=628;\n      const ringOffset = isRest ? Math.round(circ*(1 - s.restLeft/Math.max(s.rest,1))) : 0;\n      // next preview during rest\n      let nextLabel='';\n      if(isRest){ if(s.curSet<total) nextLabel='Próxima: Série '+(s.curSet+1)+' de '+total; else if(s.curIdx<day.length-1) nextLabel='Próximo: '+this.EX[day[s.curIdx+1]].name; }\n      const curSetDots = Array.from({length:total},(_,k)=>({ bg: (k+1<s.curSet || (k+1===s.curSet && isRest)) ? g.color : (k+1===s.curSet? 'rgba(255,255,255,.45)':'rgba(255,255,255,.1)') }));\n      const miniList = dayExArr.map(x=>{ const doneCount=Array.from({length:this.getSets(x.id)}).filter((_,k)=>s.done[x.id+'-'+(k+1)]).length; const isCur=x.i===s.curIdx; const full=doneCount>=this.getSets(x.id);\n        return { name:x.name, progress:doneCount+'/'+this.getSets(x.id), icon: full?'✓':(x.i+1),\n          bg:isCur?'var(--accent-soft)':'#121214', border:isCur?'color-mix(in srgb,var(--accent) 35%,transparent)':'rgba(255,255,255,.06)',\n          iconBg: full?'#16A34A':(isCur?x.g.color:'rgba(255,255,255,.06)'), iconColor: (full||isCur)?'#fff':'#9A9AA0', nameColor:isCur?'#F2F2F4':'#C4C4C8' }; });\n      return Object.assign(base, {\n        sessionTimeText:this.fmt(s.sessionSecs), completedAll, totalAll:totalSets, progressPct: Math.round(completedAll/Math.max(totalSets,1)*100)+'%',\n        curName:e.name, modeColor:g.color, timerBorder: isRest?'rgba(255,255,255,.1)':'color-mix(in srgb,'+g.color+' 30%,transparent)',\n        modeLabel: isWork?'Em execução':'Descanso', modeBg: isWork?g.soft:'rgba(255,255,255,.06)',\n        subLabel: isWork ? ('Série '+s.curSet+' de '+total+' · '+this.getReps(id)+' reps') : nextLabel,\n        ringOffset, timerText: isWork?this.fmt(s.elapsed):this.fmt(s.restLeft), timerCaption: isWork?'tempo da série':'descanso',\n        isWork, isRest, running:s.running, runLabel: s.running?'Pausar':'Retomar',\n        onToggleRun:()=>this.setState(st=>({running:!st.running})),\n        onCompleteSet:()=>this.completeSet(), onSkipRest:()=>this.setState(st=>this.advance(st)), onAddRest:()=>this.setState(st=>({restLeft:st.restLeft+15})),\n        endWorkout:()=>this.setState({started:false,mode:'idle',running:false}),\n        curSetDots, miniList,\n      });\n    }\n\n    // done\n    return Object.assign(base, {\n      doneSets: completedAll, doneExs: day.length, doneTime:this.fmt(s.sessionSecs),\n      endWorkout:()=>this.setState({started:false,mode:'idle',running:false,done:{},sessionSecs:0}),\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
