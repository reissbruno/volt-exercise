<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOLT</title>
  <link rel="icon" type="image/png" href="logo-volt.png" sizes="94x94">
  <link rel="apple-touch-icon" href="logo-volt.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #F0531C;
      --accent-strong: #F5622E;
      --accent-deep: #D94518;
      --accent-soft: rgba(240,83,28,.14);
    }
    body { background: #080809; color: #F3F3F4; font-family: Manrope, system-ui, sans-serif; font-size: 14px; }

    .hidden { display: none !important; }

    /* ── Overlay & Modals ── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(4,4,6,.66); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      display: flex; flex-direction: column;
      width: min(94vw, 480px); max-height: 82vh;
      background: #141416; border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 40px 100px -30px rgba(0,0,0,.9);
    }
    .modal-sm { width: min(94vw, 420px); max-height: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a1c; border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      padding: 10px 18px; font-size: 13px; font-weight: 500; z-index: 999; white-space: nowrap;
      animation: tin .2s ease;
    }
    .toast.hidden { display: none; }
    .toast.ok  { border-color: #22c55e; color: #22c55e; }
    .toast.err { border-color: #ef4444; color: #ef4444; }
    @keyframes tin { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%); } }

    /* ── Settings ── */
    .settings-page { max-width: 560px; margin: 0 auto; }
    .settings-section { margin-bottom: 22px; }
    .settings-section-title { font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: #8E8E94; margin-bottom: 8px; padding-left: 2px; }
    .settings-card { background: #131315; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; overflow: hidden; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,.06); gap: 14px; }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 13px; font-weight: 500; }
    .settings-row-sub { font-size: 12px; color: #8E8E94; margin-top: 2px; }
    .settings-input { background: transparent; border: none; color: #F3F3F4; font-size: 13px; font-family: Manrope, sans-serif; text-align: right; outline: none; flex: 1; min-width: 0; }
    .lang-grid { display: flex; flex-wrap: wrap; gap: 7px; padding: 13px 16px; }
    .lang-chip { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; background: transparent; color: #8E8E94; font-family: Manrope, sans-serif; }
    .lang-chip:hover { border-color: var(--accent); color: #F3F3F4; }
    .lang-chip.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-strong); font-weight: 600; }

    /* ── Pagination ── */
    .pag { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 32px; flex-wrap: wrap; }
    .pag-btn { height: 36px; padding: 0 14px; border: 1px solid rgba(255,255,255,.1); border-radius: 9px; background: transparent; color: #9A9AA0; font: 600 13px Manrope; cursor: pointer; transition: all .15s; }
    .pag-btn:hover:not(:disabled) { border-color: rgba(255,255,255,.2); color: #fff; background: rgba(255,255,255,.05); }
    .pag-btn:disabled { opacity: .35; cursor: default; }
    .pag-info { color: #8E8E94; font-size: 13px; font-weight: 500; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }

    /* ── Spinner ── */
    .spinner { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,.1); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth — VOLT exact design ── */
    @keyframes voltPop { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:none; } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }
    @keyframes voltGlow {
      0%,100% { opacity:.13; transform:translateX(-50%) scale(1); }
      50%      { opacity:.18; transform:translateX(-50%) scale(1.12); }
    }
    .volt-auth-page {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      padding: clamp(16px,4vw,40px); overflow-y: auto; overflow-x: hidden;
      font-family: Manrope, system-ui, sans-serif;
      background:
        radial-gradient(125% 80% at 50% -12%, color-mix(in srgb,var(--accent) 18%,transparent), transparent 58%),
        radial-gradient(60% 40% at 80% 110%, color-mix(in srgb,var(--accent) 8%,transparent), transparent 55%),
        #08080A;
    }
    .volt-glow {
      position: absolute; top: -20%; left: 50%; transform: translateX(-50%); opacity: .13;
      width: clamp(380px,55vw,680px); aspect-ratio: 1;
      background: radial-gradient(circle, color-mix(in srgb,var(--accent) 75%,transparent) 0%, transparent 68%);
      filter: blur(48px); pointer-events: none; border-radius: 50%;
      animation: voltGlow 9s ease-in-out infinite;
    }
    .volt-vignette { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 40%, rgba(8,8,10,.6) 100%); }
    .volt-card {
      position: relative; z-index: 1; width: min(100%,432px);
      background: linear-gradient(180deg,rgba(23,23,26,.92),rgba(15,15,17,.94));
      border: 1px solid rgba(255,255,255,.07); border-radius: 26px;
      padding: clamp(28px,5vw,42px);
      box-shadow: 0 40px 90px -34px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(14px);
    }
    .volt-back { display: flex; align-items: center; gap: 5px; background: none; border: none; color: #8A8A90; font: 600 13px Manrope; cursor: pointer; margin-bottom: 20px; padding: 0; transition: color .15s; }
    .volt-back:hover { color: #F7F7F6; }
    .volt-logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .volt-logo-icon { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 12px; background: var(--accent-soft); border: 1px solid color-mix(in srgb,var(--accent) 35%,transparent); }
    .volt-brand { font-family: Anton, sans-serif; font-size: 26px; letter-spacing: .05em; color: #F7F7F6; line-height: 1; }
    .volt-tagline { color: #9A9AA0; font-size: 15.5px; line-height: 1.6; font-weight: 500; margin-bottom: 26px; }
    .volt-stats { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
    .volt-stats-hi { font-weight: 800; color: #F7F7F6; font-size: 15px; }
    .volt-stats-lo { color: #7A7A80; font-size: 14px; }
    .volt-stats-dot { width: 4px; height: 4px; border-radius: 50%; background: #3A3A42; flex-shrink: 0; }
    .volt-btn-col { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
    .volt-btn-primary { width: 100%; height: 52px; border: none; border-radius: 14px; background: linear-gradient(180deg,var(--accent-strong),var(--accent-deep)); color: #fff; font: 700 16px Manrope; cursor: pointer; box-shadow: 0 14px 36px -12px color-mix(in srgb,var(--accent) 65%,transparent); transition: filter .15s; }
    .volt-btn-primary:hover { filter: brightness(1.06); }
    .volt-btn-secondary { width: 100%; height: 52px; border: 1px solid rgba(255,255,255,.14); border-radius: 14px; background: rgba(255,255,255,.03); color: #E4E4E8; font: 700 16px Manrope; cursor: pointer; transition: background .15s, border-color .15s; }
    .volt-btn-secondary:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.24); }
    .volt-lock-row { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 24px; color: #5C5C62; font-size: 12.5px; }
    .volt-form-head { text-align: center; margin-bottom: 24px; }
    .volt-form-head h1 { margin: 0; font: 800 24px Manrope; letter-spacing: -.01em; color: #F7F7F6; }
    .volt-form-head p { margin: 6px 0 0; color: #9A9AA0; font-size: 14px; }
    .volt-form { display: flex; flex-direction: column; gap: 16px; }
    .volt-field { display: flex; flex-direction: column; }
    .volt-label { display: block; font: 600 11px Manrope; letter-spacing: .09em; text-transform: uppercase; color: #8A8A90; margin-bottom: 9px; }
    .volt-input { width: 100%; height: 52px; padding: 0 16px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09); color: #F5F5F4; font: 500 15px Manrope; outline: none; transition: border-color .18s, box-shadow .18s; }
    .volt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .volt-pw-wrap { position: relative; }
    .volt-input-pw { padding: 0 48px 0 16px; }
    .volt-pw-toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: #7A7A80; cursor: pointer; border-radius: 9px; transition: color .15s; }
    .volt-pw-toggle:hover { color: #C9C9CE; }
    .volt-forgot { display: block; text-align: right; margin-top: 10px; color: #9A9AA0; font-size: 13px; text-decoration: none; transition: color .15s; }
    .volt-forgot:hover { color: var(--accent); }
    .volt-form-err { color: #FF6B4A; font-size: 13px; min-height: 18px; text-align: center; }
    .volt-switch { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.07); color: #8A8A90; font-size: 13.5px; }
    .volt-switch-btn { background: none; border: none; color: var(--accent); font: 700 13.5px Manrope; cursor: pointer; padding: 0; }
    .volt-tos { text-align: center; margin: 16px 0 0; color: #5C5C62; font-size: 11.5px; line-height: 1.5; }
  #bottom-nav { display: flex !important; }
  #main { padding-bottom: 80px; }
  @media (max-width: 640px) {
    #hdr-nav { display: none !important; }
    #hdr-logout { display: none !important; }
    #user-name-hdr { display: none !important; }
    header { flex-wrap: nowrap !important; }
  }
  </style>
</head>
<body>

<!-- ── App shell ── -->
<div id="app" class="hidden" style="min-height:100dvh;width:100%;font-family:Manrope,system-ui,sans-serif;background:radial-gradient(120% 60% at 50% -5%,color-mix(in srgb,var(--accent) 9%,transparent),transparent 55%),#080809;color:#F3F3F4;">

  <header style="position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px clamp(16px,3vw,32px);background:rgba(10,10,12,.78);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);">
    <div style="display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="go('exercises')">
      <img src="logo-volt.png" alt="VOLT" style="height:36px;width:auto;object-fit:contain;"><span style="font-family:Anton,sans-serif;font-size:22px;letter-spacing:.05em;color:#F7F7F6;line-height:1;">VOLT</span>
    </div>
    <nav id="hdr-nav" style="display:flex;align-items:center;gap:4px;padding:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;">
      <button id="tab-ex" onclick="go('exercises')" style="display:flex;align-items:center;gap:8px;height:38px;padding:0 18px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;white-space:nowrap;transition:background .15s,color .15s;">Exercícios</button>
      <button id="tab-pl" onclick="go('plans')" style="display:flex;align-items:center;gap:8px;height:38px;padding:0 18px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;white-space:nowrap;transition:background .15s,color .15s;">Meus Planos<span id="plan-badge" class="hidden" style="min-width:20px;height:20px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:var(--accent);color:#fff;font-size:11.5px;font-weight:800;"></span></button>
      <button id="tab-wk" onclick="go('workout')" style="display:flex;align-items:center;gap:8px;height:38px;padding:0 18px;border:none;border-radius:10px;cursor:pointer;font:700 14px Manrope;white-space:nowrap;transition:background .15s,color .15s;">Treino</button>
    </nav>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="user-info" style="display:flex;align-items:center;gap:9px;cursor:pointer;" onclick="go('settings')" title="Configurações">
        <span id="user-avatar" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent-strong),var(--accent-deep));color:#fff;font-weight:800;font-size:14px;flex-shrink:0;"></span>
        <span id="user-name-hdr" style="font-size:14px;font-weight:600;color:#D8D8DC;"></span>
      </div>
      <button id="hdr-logout" onclick="logout()" style="height:38px;padding:0 16px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:transparent;color:#C4C4C8;font:600 13.5px Manrope;cursor:pointer;transition:background .15s,color .15s;" onmouseover="this.style.background='rgba(255,255,255,.05)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='#C4C4C8'">Sair</button>
    </div>
  </header>

  <!-- Bottom nav (mobile only) -->
  <nav id="bottom-nav" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,12,.96);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.08);padding:10px 0 env(safe-area-inset-bottom,10px);">
    <div style="display:flex;width:100%;justify-content:space-evenly;align-items:center;">
      <button id="bnav-ex" onclick="go('exercises')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0;background:none;border:none;cursor:pointer;color:#7C7C82;transition:color .15s;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span id="bnav-ex-dot" style="width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .15s;"></span>
      </button>
      <button id="bnav-pl" onclick="go('plans')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0;background:none;border:none;cursor:pointer;color:#7C7C82;transition:color .15s;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span id="bnav-pl-dot" style="width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .15s;"></span>
      </button>
      <button id="bnav-wk" onclick="go('workout')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0;background:none;border:none;cursor:pointer;color:#7C7C82;transition:color .15s;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"/></svg>
        <span id="bnav-wk-dot" style="width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .15s;"></span>
      </button>
      <button id="bnav-st" onclick="go('settings')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0;background:none;border:none;cursor:pointer;color:#7C7C82;transition:color .15s;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span id="bnav-st-dot" style="width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .15s;"></span>
      </button>
    </div>
  </nav>

  <main id="main" style="max-width:1340px;margin:0 auto;padding:clamp(20px,3vw,32px) clamp(16px,3vw,32px) 64px;"></main>
</div>

<!-- ── Auth page ── -->
<div id="auth-root"></div>

<!-- ── Modals ── -->
<div class="overlay hidden" id="overlay" onclick="onOvClick(event)">
  <div class="modal hidden" id="m-assign" onclick="event.stopPropagation()" style="width:min(96vw,980px);max-height:92dvh;flex-direction:row;flex-wrap:wrap;border-radius:26px;overflow:hidden;align-items:stretch;"></div>
  <div class="modal hidden" id="m-day" onclick="if(S.dayModalOpenFilter&&!event.target.closest('#day-equip-drop')&&!event.target.closest('button[onclick*=toggleDayEquip]')){S.dayModalOpenFilter=false;renderDayModal();}event.stopPropagation()"></div>
  <div class="modal hidden" id="m-weight" onclick="event.stopPropagation()" style="width:min(94vw,360px);border-radius:22px;padding:28px 24px;flex-direction:column;gap:0;"></div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
const API = '';

// ── Body-part color groups ────────────────────────────────────────────────────
const BODY_COLORS = {

const EQUIP_LABELS = {
  pt: { 'body weight':'Peso corporal','barbell':'Barra','dumbbell':'Haltere','cable':'Cabo','machine':'Máquina','leverage machine':'Máq. alavanca','assisted':'Assistido','medicine ball':'Bola medicinal','band':'Elástico','kettlebell':'Kettlebell','smith machine':'Smith Machine','ez barbell':'Barra EZ','olympic barbell':'Barra olímpica','trap bar':'Barra trap','stability ball':'Bola equilíbrio','foam roll':'Rolo de espuma','roller':'Rolo','rope':'Corda','suspension':'Suspensão','weighted':'Com peso','wheel roller':'Roda abdominal','resistance band':'Faixa elástica','bosu ball':'Bosu','sled machine':'Trenó','tire':'Pneu','hammer':'Martelo' },

async function api(path, opts = {}) {
  const h = {'Content-Type':'application/json', ...(opts.headers||{})};
  if (S.token) h.Authorization = `Bearer ${S.token}`;
  const r = await fetch(API + path, {...opts, headers: h});
  if (r.status === 204) return null;
  const d = await r.json().catch(() => ({}));
  if (r.status === 401) { if (S.token) { clearAuth(); showAuthPage(); } throw new Error(d.detail || 'Não autorizado'); }
  if (!r.ok) throw new Error(d.detail || d.error || `HTTP ${r.status}`);
  return d;
}
function imgUrl(p) { return p ? `${API}/${p}` : ''; }

const _WS_KEYS = ['fit_sessions','fit_ws_prefs','fit_weight_log'];
function setAuth(tok, user) {
  const prev = localStorage.getItem('fit_usr');
  const prevId = prev ? JSON.parse(prev)?.id : null;
  if (prevId !== user.id) _WS_KEYS.forEach(k => localStorage.removeItem(k));
  S.token = tok; S.user = user;
  localStorage.setItem('fit_tok', tok);
  localStorage.setItem('fit_usr', JSON.stringify(user));
}
function clearAuth() {
  S.token = null; S.user = null;
  localStorage.removeItem('fit_tok'); localStorage.removeItem('fit_usr');
  _WS_KEYS.forEach(k => localStorage.removeItem(k));
}

const _exCache = {};

async function openAssign(exId, exObj) {
  if (!S.user) { showAuthPage('login'); return; }
  await ensurePlan();
  S.assignExId = exId;
  if (exObj) _exCache[exId] = exObj;
  else if (!_exCache[exId]) _exCache[exId] = S.exs.find(e=>e.id===exId);
  if (!_exCache[exId]) {
    try { _exCache[exId] = await api(`/exercises/${exId}`); } catch(e) {}
  }
  renderAssignModal();
  openM('m-assign');
  _loadExInstr(exId);
  _loadExInsights(exId);
  _loadExAlts(exId);
}

async function _loadExInsights(exId) {
  if (!_exCache[exId]) return;
  const lang = S.settings.lang || 'en';
  // Cache hit: already loaded in the right language (or translation confirmed)
  if (_exCache[exId]._insights !== undefined && _exCache[exId]._insights_lang === lang) return;
  const qs = lang === 'pt' ? '?lang=pt' : '';
  try {
    const ins = await api(`/exercises/${exId}/insights${qs}`);
    _exCache[exId]._insights = ins;
    // If Argos wasn't ready (_translated===false), keep lang as 'en' so we retry next open
    _exCache[exId]._insights_lang = (lang === 'pt' && ins._translated === false) ? 'en' : lang;
  } catch(e) {
    _exCache[exId]._insights = null;
    _exCache[exId]._insights_lang = lang;
  }
  if (S.assignExId === exId) renderAssignModal();
}

async function _loadExInstr(exId) {
  const ex = _exCache[exId];
  if (!ex) return;
  const lang = S.settings.lang;
  if (ex._instr_lang === lang && ex._instr !== undefined) return;
  let text = '';
  if (lang === 'en') {
    text = ex.instructions_en || '';
  } else if (lang === 'pt' && ex.instructions_pt) {
    text = ex.instructions_pt;
  } else if (lang !== 'pt' && ex[`instructions_${lang}`]) {
    text = ex[`instructions_${lang}`];
  } else if (ex.instructions_en) {
    if (lang === 'pt') {
      try {
        const d = await api('/translate', {method:'POST', body:JSON.stringify({text:ex.instructions_en, source:'en', target:'pt'})});
        text = d.translated || ex.instructions_en;
      } catch(e) { text = ex.instructions_en; }
    } else {
      text = ex.instructions_en;
    }
  }
  _exCache[exId]._instr = text;
  _exCache[exId]._instr_lang = lang;
  if (S.assignExId === exId) renderAssignModal();
}

function _sparkline(values, w, h) {
  if (!values || values.length < 2) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pad = 4;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * (w - pad * 2) + pad;
    const y = (h - pad) - ((v - min) / range) * (h - pad * 2) + pad;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lx = (w - pad).toFixed(1);
  const ly = ((h - pad) - ((values[values.length-1] - min) / range) * (h - pad * 2) + pad).toFixed(1);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;">
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
    <circle cx="${lx}" cy="${ly}" r="3" fill="var(--accent)"/>
  </svg>`;
}

async function toggleExDay(exId, dayKey) {
  await ensurePlan();
  const dayObj = S.plan.schedule.find(s=>s.day_of_week===dayKey);
  const entry = dayObj?.exercises.find(e=>e.exercise.id===exId);
  try {
    if (entry) {
      await api(`/plans/${S.plan.id}/schedule/${entry.entry_id}`, {method:'DELETE'});
    } else {
      if (S.restDays[dayKey]) { S.restDays[dayKey]=false; localStorage.setItem('fit_rest',JSON.stringify(S.restDays)); }
      await api(`/plans/${S.plan.id}/schedule`, {method:'POST', body:JSON.stringify({day_of_week:dayKey,exercise_id:exId,sets:3,reps:10,rest_seconds:60})});
    }
    await reloadPlan();
    renderAssignModal();
    renderHeader();
    if (S.view==='exercises') renderExsView();
  } catch(e) { toast(e.message,'err'); }
}

async function ensurePlan() {
  if (S.plan) return;
  const plans = await api('/plans');
  if (plans.length) {
    S.plan = await api(`/plans/${plans[0].id}`);
  } else {
    const p = await api('/plans', {method:'POST', body:JSON.stringify({name:'Meu Plano',focus:'custom'})});
    S.plan = await api(`/plans/${p.id}`);
  }
}

async function reloadPlan() {
  if (!S.plan) return;
  S.plan = await api(`/plans/${S.plan.id}`);
}

function dayExercises(dayKey) {
  return S.plan?.schedule.find(d=>d.day_of_week===dayKey)?.exercises || [];
}

function renderPlansView() {
  const uniq = new Set();
  if (S.plan) S.plan.schedule.forEach(d=>d.exercises.forEach(e=>uniq.add(e.exercise.id)));
  const total = uniq.size;
  const daysActive = WEEK.filter(d => dayExercises(d.key).length>0 && !S.restDays[d.key]).length;
  const subtitle = total > 0
    ? `${total} exercício${total===1?'':'s'} em ${daysActive} dia${daysActive===1?'':'s'} de treino`
    : 'Escolha os dias e adicione os exercícios de cada treino.';

  g('main').innerHTML = `
    <div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;">
        <div>
          <h1 style="margin:0;font:800 clamp(24px,3vw,30px) Manrope;letter-spacing:-.02em;color:#F7F7F6;">Meu plano semanal</h1>
          <p style="margin:6px 0 0;color:#8E8E94;font-size:14.5px;">${subtitle}</p>
        </div>
        ${total>0?`<button onclick="clearPlan()" style="height:46px;padding:0 18px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:transparent;color:#C4C4C8;font:600 14px Manrope;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.05)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='#C4C4C8'">Limpar plano</button>`:''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;align-items:start;">
        ${WEEK.map(d=>dayCard(d)).join('')}
      </div>
      ${total>0?`
      <div style="margin-top:28px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
          <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
          <span style="font:700 11.5px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.06em;">Sugestões de progressão</span>
          <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
        </div>
        <div id="plan-progression" style="color:#5C5C62;font-size:13px;text-align:center;padding:16px;">Carregando sugestões...</div>
      </div>`:''}
    </div>`;
  if (total>0) loadPlanProgression();
}

async function loadPlanProgression() {
  const el = g('plan-progression');
  if (!el || !S.plan) return;
  try {
    const data = await api(`/plans/${S.plan.id}/progression`);
    const days = data.progression.filter(d => d.exercises.length > 0);
    if (!days.length) { el.innerHTML = '<p style="color:#5C5C62;padding:8px;text-align:center;">Insights não disponíveis — rode o script de enriquecimento.</p>'; return; }
    const TC = {reps:'#4CAF50',sets:'#2196F3',variation:'#F0531C',weight:'#FF9800'};
    const TL = {reps:'↑ reps',sets:'+ série',variation:'→ variação',weight:'↑ carga'};
    el.innerHTML = days.map(d=>`
      <div style="margin-bottom:14px;">
        <p style="margin:0 0 8px;font:700 12px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.05em;">${d.day}</p>
        <div style="display:flex;flex-direction:column;gap:7px;">
          ${d.exercises.map(ex=>{
            const sc=TC[ex.suggestion.type]||'#9A9AA0';
            return `<div style="display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:#121214;border:1px solid rgba(255,255,255,.06);">
              <div style="flex:1;min-width:0;">
                <p style="margin:0;font:600 13px Manrope;color:#DCDCE0;text-transform:capitalize;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${ex.exercise_name}</p>
                <p style="margin:4px 0 0;color:#7C7C82;font-size:12px;">${ex.current.sets}×${ex.current.reps} → <span style="color:#DCDCE0;font-weight:700;">${ex.suggestion.sets}×${ex.suggestion.reps}</span>${ex.suggestion.type==='variation'&&ex.harder_variation?` <span style="color:var(--accent);">→ ${ex.harder_variation}</span>`:''}</p>
              </div>
              <span style="flex:none;padding:3px 9px;border-radius:7px;background:${sc}22;color:${sc};font:700 11px Manrope;">${TL[ex.suggestion.type]||ex.suggestion.type}</span>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('');
  } catch(e) {
    const el2=g('plan-progression'); if(el2) el2.innerHTML='<p style="color:#5C5C62;padding:8px;text-align:center;">Não foi possível carregar as sugestões.</p>';
  }
}

function dayCard(d) {
  const exs = dayExercises(d.key);
  const isRest = !!S.restDays[d.key];
  const hasBorder = exs.length>0 && !isRest;
  return `
    <section style="display:flex;flex-direction:column;background:#121214;border:1px solid ${hasBorder?'color-mix(in srgb,var(--accent) 26%,transparent)':'rgba(255,255,255,.07)'};border-radius:18px;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);">
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="font:800 15px Manrope;color:#F2F2F4;">${d.label}</span>
          ${exs.length>0&&!isRest?`<span style="min-width:20px;height:20px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:var(--accent-soft);color:var(--accent-strong);font-size:11px;font-weight:800;">${exs.length}</span>`:''}
        </div>
        <button onclick="toggleRest(${d.key})" title="Dia de descanso" style="display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:1px solid ${isRest?'color-mix(in srgb,var(--accent) 34%,transparent)':'rgba(255,255,255,.12)'};background:${isRest?'var(--accent-soft)':'transparent'};color:${isRest?'var(--accent-strong)':'#8A8A90'};cursor:pointer;transition:all .15s;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
      ${isRest ? `
        <div style="padding:26px 16px;text-align:center;">
          <p style="margin:0;color:#7E7E84;font-size:13.5px;font-weight:600;">Dia de descanso</p>
          <button onclick="toggleRest(${d.key})" style="margin-top:10px;background:none;border:none;color:var(--accent);font:700 13px Manrope;cursor:pointer;">Treinar neste dia</button>
        </div>` : `
        <div style="display:flex;flex-direction:column;gap:8px;padding:12px;">
          ${exs.map(entry=>dayExItem(entry)).join('')}
          ${exs.length===0?`<p style="margin:2px 0 4px;text-align:center;color:#62626A;font-size:12.5px;">Nenhum exercício ainda</p>`:''}
          <button onclick="openDayModal(${d.key})" style="display:flex;align-items:center;justify-content:center;gap:7px;height:42px;border:1px dashed rgba(255,255,255,.16);border-radius:11px;background:transparent;color:#A6A6AC;font:700 13px Manrope;cursor:pointer;transition:all .15s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent-strong)';this.style.background='var(--accent-soft)'" onmouseout="this.style.borderColor='rgba(255,255,255,.16)';this.style.color='#A6A6AC';this.style.background='transparent'">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>
            Adicionar exercício
          </button>
        </div>`}
    </section>`;
}

function dayExItem(entry) {
  const ex = entry.exercise;
  const c = grp(ex.body_part);
  return `
    <div style="display:flex;align-items:center;gap:10px;padding:9px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:11px;">
      <span style="flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${c.soft};"><span style="width:7px;height:7px;border-radius:50%;background:${c.color};"></span></span>
      <span style="flex:1;min-width:0;font:600 13px Manrope;color:#DCDCE0;text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${exName(ex)}</span>
      <button onclick="removeEntry(${entry.entry_id})" style="flex:none;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:#7A7A80;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='rgba(244,63,63,.14)';this.style.color='#F87171'" onmouseout="this.style.background='transparent';this.style.color='#7A7A80'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>
      </button>
    </div>`;
}

async function removeEntry(entryId) {
  await api(`/plans/${S.plan.id}/schedule/${entryId}`, {method:'DELETE'});
  await reloadPlan(); renderPlansView(); renderHeader();
}

function toggleRest(dayKey) {
  S.restDays[dayKey] = !S.restDays[dayKey];
  localStorage.setItem('fit_rest', JSON.stringify(S.restDays));
  renderPlansView();
}

async function clearPlan() {
  if (!S.plan) return;
  await api(`/plans/${S.plan.id}`, {method:'DELETE'});
  S.plan = null; S.restDays = {}; localStorage.setItem('fit_rest','{}');
  await ensurePlan(); renderPlansView(); renderHeader(); toast('Plano limpo!');
}

// ── Add exercise to a day modal ───────────────────────────────────────────────
async function openDayModal(dayKey) {
  S.dayModalDay = dayKey; S.dayModalSearch = ''; S.dayModalPage = 1;
  S.dayModalFilters = {body_part:'', equipment:''}; S.dayModalOpenFilter = false;
  await loadDayModalExs();
  renderDayModal();
  openM('m-day');
}

async function loadDayModalExs(page=1) {
  const p = new URLSearchParams({page, limit:20});
  if (S.dayModalSearch)               p.set('name',      S.dayModalSearch);
  if (S.dayModalFilters.body_part)    p.set('body_part',  S.dayModalFilters.body_part);
  if (S.dayModalFilters.equipment)    p.set('equipment',  S.dayModalFilters.equipment);
  const d = await api(`/exercises?${p}`);
  S.dayModalExs = d.data; S.dayModalPage = d.page; S.dayModalTotal = d.total;
}

function renderDayModal() {
  const day = WEEK.find(d=>d.key===S.dayModalDay);
  const curExs = dayExercises(S.dayModalDay);
  const totalPages = Math.ceil(S.dayModalTotal/20);
  const activePart = S.dayModalFilters.body_part;
  const activeEquip = S.dayModalFilters.equipment;
  const hasFilter = activePart || activeEquip;

  // Body-part chip row
  const partChips = ['',...S.meta.parts].map(p => {
    const c = p ? grp(p) : {color:'#9A9AA0',soft:'rgba(154,154,160,.1)'};

    const label = p ? tPart(p) : 'Todos';
    return `<button onclick="applyDayFilter('body_part','${p}')" style="flex:none;display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid ${sel?c.color:'rgba(255,255,255,.1)'};background:${sel?c.soft:'transparent'};color:${sel?c.color:'#9A9AA0'};font:700 12px Manrope;cursor:pointer;white-space:nowrap;transition:all .13s;" onmouseover="this.style.borderColor='${c.color}';this.style.color='${c.color}'" onmouseout="this.style.borderColor='${sel?c.color:'rgba(255,255,255,.1)'}';this.style.color='${sel?c.color:'#9A9AA0'}'">
      ${sel?`<span style="width:5px;height:5px;border-radius:50%;background:${c.color};flex-shrink:0;"></span>`:''}${label}</button>`;
  }).join('');

  // Equipment dropdown
  const equipOpts = S.meta.equip.map(e=>`<button onclick="applyDayFilter('equipment','${e}')" style="display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:9px 12px;border:none;border-radius:8px;background:transparent;color:${activeEquip===e?'#fff':'#C4C4C8'};font:600 13.5px Manrope;text-align:left;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.06)'" onmouseout="this.style.background='transparent'">${tEquip(e)}${activeEquip===e?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"><path d="M20 6L9 17l-5-5"></path></svg>`:''}</button>`).join('');

  const items = S.dayModalExs.map(ex => {
    const c = grp(ex.body_part);
    const on = curExs.some(e=>e.exercise.id===ex.id);
    return `
      <button onclick="toggleDayEx('${ex.id}')" style="display:flex;align-items:center;gap:12px;padding:10px;border:1px solid ${on?'color-mix(in srgb,var(--accent) 30%,transparent)':'rgba(255,255,255,.07)'};border-radius:12px;background:${on?'rgba(240,83,28,.07)':'rgba(255,255,255,.02)'};cursor:pointer;text-align:left;transition:all .14s;width:100%;" onmouseover="this.style.borderColor='rgba(255,255,255,.16)'" onmouseout="this.style.borderColor='${on?'color-mix(in srgb,var(--accent) 30%,transparent)':'rgba(255,255,255,.07)'}'">
        <span style="flex:none;width:36px;height:36px;border-radius:9px;background:${c.soft};display:flex;align-items:center;justify-content:center;">
          <span style="width:8px;height:8px;border-radius:50%;background:${c.color};"></span>
        </span>
        <span style="flex:1;min-width:0;">
          <span style="display:block;font:600 14px Manrope;color:#ECECEE;text-transform:capitalize;line-height:1.3;">${exName(ex)}</span>
          <span style="display:block;margin-top:3px;color:${c.color};font-size:11.5px;font-weight:700;">${tPart(ex.body_part)||''}<span style="color:#8E8E94;font-weight:600;">${ex.equipment?' · '+tEquip(ex.equipment):''}</span></span>
        </span>
        <span style="flex:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${on?'var(--accent)':'transparent'};border:1.5px solid ${on?'var(--accent)':'rgba(255,255,255,.2)'};color:${on?'#fff':'#8A8A90'};">
          ${on?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M20 6L9 17l-5-5"></path></svg>`:
               `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg>`}
        </span>
      </button>`;
  }).join('');

  g('m-day').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;">
      <div>
        <p style="margin:0;font:800 17px Manrope;color:#F4F4F6;">Adicionar a ${day?.label||''}</p>
        <p style="margin:3px 0 0;color:#8E8E94;font-size:13px;">Toque para incluir ou remover do dia.</p>

        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>
      </button>

    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="position:relative;flex:1;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7A7A80" stroke-width="2" stroke-linecap="round" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
          <input type="text" value="${S.dayModalSearch}" oninput="onDaySearch(this.value)" placeholder="Buscar exercício..." style="width:100%;height:40px;padding:0 12px 0 36px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:#F3F3F4;font:500 14px Manrope;outline:none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(255,255,255,.09)'">
        </div>
        <div style="position:relative;flex-shrink:0;">
          <button onclick="toggleDayEquipFilter(event)" style="display:flex;align-items:center;gap:6px;height:40px;padding:0 12px;border-radius:10px;border:1px solid ${activeEquip?'color-mix(in srgb,var(--accent) 40%,transparent)':'rgba(255,255,255,.09)'};background:${activeEquip?'var(--accent-soft)':'rgba(255,255,255,.04)'};color:${activeEquip?'var(--accent-strong)':'#9A9AA0'};font:600 13px Manrope;cursor:pointer;white-space:nowrap;">

          ${S.dayModalOpenFilter?`
            <div id="day-equip-drop" style="position:absolute;top:calc(100% + 6px);right:0;z-index:10;min-width:200px;max-height:240px;overflow-y:auto;padding:6px;background:#1a1a1c;border:1px solid rgba(255,255,255,.12);border-radius:13px;box-shadow:0 20px 50px -16px rgba(0,0,0,.9);">
              <button onclick="applyDayFilter('equipment','')" style="display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:9px 12px;border:none;border-radius:8px;background:transparent;color:${!activeEquip?'#fff':'#C4C4C8'};font:600 13.5px Manrope;text-align:left;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,.06)'" onmouseout="this.style.background='transparent'">Todos${!activeEquip?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round"><path d="M20 6L9 17l-5-5"></path></svg>`:''}</button>

      ${hasFilter?`
        <button onclick="clearDayFilters()" style="align-self:flex-start;display:flex;align-items:center;gap:5px;background:none;border:none;color:#9A9AA0;font:600 12px Manrope;cursor:pointer;padding:0;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='#9A9AA0'">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>

    </div>

    ${totalPages>1?`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;">
        <button onclick="goDayPage(${S.dayModalPage-1})" style="height:34px;padding:0 12px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:transparent;color:#9A9AA0;font:600 13px Manrope;cursor:pointer;${S.dayModalPage<=1?'opacity:.35':''}" ${S.dayModalPage<=1?'disabled':''}>← Anterior</button>

        <button onclick="goDayPage(${S.dayModalPage+1})" style="height:34px;padding:0 12px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:transparent;color:#9A9AA0;font:600 13px Manrope;cursor:pointer;${S.dayModalPage>=totalPages?'opacity:.35':''}" ${S.dayModalPage>=totalPages?'disabled':''}>Próxima →</button>
      </div>`:''}

    <div style="padding:12px 14px 14px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;">
      <button onclick="finishDayModal()" style="width:100%;height:46px;border:none;border-radius:12px;cursor:pointer;color:#fff;font:700 15px Manrope;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));" onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter=''">Concluir</button>
    </div>`;
}

let _daySearchTimer;
function onDaySearch(v) {
  S.dayModalSearch = v; S.dayModalOpenFilter = false;
  clearTimeout(_daySearchTimer);
  _daySearchTimer = setTimeout(async () => { await loadDayModalExs(1); renderDayModal(); }, 350);
}
async function applyDayFilter(key, value) {
  S.dayModalFilters[key] = value; S.dayModalOpenFilter = false;
  await loadDayModalExs(1); renderDayModal();
}
async function clearDayFilters() {
  S.dayModalFilters = {body_part:'', equipment:''}; S.dayModalOpenFilter = false;
  await loadDayModalExs(1); renderDayModal();
}
function toggleDayEquipFilter(e) {
  e.stopPropagation(); S.dayModalOpenFilter = !S.dayModalOpenFilter; renderDayModal();
}
async function goDayPage(p) { S.dayModalOpenFilter=false; await loadDayModalExs(p); renderDayModal(); }

async function toggleDayEx(exId) {
  await ensurePlan();
  const curExs = dayExercises(S.dayModalDay);
  const entry = curExs.find(e=>e.exercise.id===exId);
  try {
    if (entry) {
      await api(`/plans/${S.plan.id}/schedule/${entry.entry_id}`, {method:'DELETE'});
    } else {
      if (S.restDays[S.dayModalDay]) { S.restDays[S.dayModalDay]=false; localStorage.setItem('fit_rest',JSON.stringify(S.restDays)); }
      await api(`/plans/${S.plan.id}/schedule`, {method:'POST', body:JSON.stringify({day_of_week:S.dayModalDay,exercise_id:exId,sets:3,reps:10,rest_seconds:60})});
    }
    await reloadPlan(); renderDayModal(); renderHeader();
  } catch(e) { toast(e.message,'err'); }
}

const WS = {
  day: 1, sets: {}, reps: {}, weights: {}, rest: 60,
  started: false, mode: 'idle', running: false,
  curIdx: 0, curSet: 1, elapsed: 0, restLeft: 0, sessionSecs: 0, done: {}, _insights: {}
};
let _wsTid = null;

function wsExsForDay(dayKey) {
  return S.plan?.schedule.find(d => d.day_of_week === dayKey)?.exercises || [];
}

function wsGetReps(exId)    { return WS.reps[exId]    ?? 10; }

function startWsTick() {
  if (_wsTid) return;
  _wsTid = setInterval(() => {
    if (!WS.started || WS.mode === 'done' || !WS.running) return;
    WS.sessionSecs++;
    if (WS.mode === 'work') {
      WS.elapsed++;
    } else if (WS.mode === 'rest') {
      WS.restLeft = Math.max(0, WS.restLeft - 1);
      if (WS.restLeft === 0) { wsAdvanceSet(); }
    }
    if (S.view === 'workout') renderWorkoutView();
  }, 1000);
}
function stopWsTick() { clearInterval(_wsTid); _wsTid = null; }

function wsLoadPrefs() {
  const p = JSON.parse(localStorage.getItem('fit_ws_prefs') || '{}');
  if (p.sets)     WS.sets    = p.sets;
  if (p.reps)     WS.reps    = p.reps;
  if (p.weights)  WS.weights = p.weights;
  if (p.rest)     WS.rest    = p.rest;
}

  localStorage.setItem('fit_ws_prefs', JSON.stringify({sets: WS.sets, reps: WS.reps, weights: WS.weights, rest: WS.rest}));
}

function wsInitDay() {
  wsLoadPrefs();
  if (WS.started) return;
  const today = new Date().getDay();
  if (wsExsForDay(today).length > 0) { WS.day = today; return; }
  const order = [1,2,3,4,5,6,0];
  const first = order.find(d => wsExsForDay(d).length > 0);
  WS.day = first !== undefined ? first : today;
}

async function _preloadDayInsights(exEntries) {
  for (const entry of exEntries) {
    const exId = entry.exercise?.id;
    if (!exId || WS._insights[exId]) continue;
    try { WS._insights[exId] = await api(`/exercises/${exId}/insights`); } catch(e) {}
  }
}

function wsAdvanceSet() {
  const exs = wsExsForDay(WS.day);
  const curId = exs[WS.curIdx]?.exercise.id;
  if (WS.curSet < wsGetSets(curId)) {
    WS.mode = 'work'; WS.elapsed = 0; WS.curSet++; WS.running = true;
  } else if (WS.curIdx < exs.length - 1) {
    WS.mode = 'work'; WS.elapsed = 0; WS.curIdx++; WS.curSet = 1; WS.running = true;
  } else {
    WS.mode = 'done'; WS.running = false;
  }
}

function wsCompleteSet() {
  const exs = wsExsForDay(WS.day);
  const curEntry = exs[WS.curIdx];
  const curId = curEntry?.exercise.id;
  WS.done[curId + '-' + WS.curSet] = true;
  // auto-log weight if set
  const w = wsGetWeight(curId);
  if (w > 0) {
    const log = JSON.parse(localStorage.getItem('fit_weight_log') || '[]');
    log.push({ date: new Date().toISOString().slice(0,10), exId: curId, exName: curEntry.exercise.name, set: WS.curSet, weight: w, reps: wsGetReps(curId) });
    localStorage.setItem('fit_weight_log', JSON.stringify(log));
  }
  const isLastSet = WS.curSet >= wsGetSets(curId);
  const isLastEx = WS.curIdx >= exs.length - 1;
  if (isLastSet && isLastEx) { WS.mode = 'done'; WS.running = false; }
  else { WS.mode = 'rest'; WS.restLeft = WS.rest; WS.running = true; }
  renderWorkoutView();
}

function wsStartWorkout() {
  WS.started = true; WS.mode = 'work'; WS.running = true;
  WS.curIdx = 0; WS.curSet = 1; WS.elapsed = 0; WS.sessionSecs = 0; WS.done = {}; WS._startTs = Date.now();
  _preloadDayInsights(wsExsForDay(WS.day));
  renderWorkoutView();
}

function wsSaveSession() {
  if (Object.keys(WS.done).length === 0) return;
  const exs = wsExsForDay(WS.day);
  const dayInfo = WEEK.find(d => d.key === WS.day);

  const mets = exs.map(e => WS._insights[e.exercise?.id]?.calories_per_min_met || 3.5);
  const avgMet = mets.reduce((a, b) => a + b, 0) / (mets.length || 1);
  const weightKg = S.user?.weight_kg || 70;
  const totalSetsDone = Object.keys(WS.done).length;

  let volumeKg = 0;
  Object.entries(WS.weights).forEach(([exId, kg]) => {
    if (kg > 0) {
      const setsDone = Object.keys(WS.done).filter(k => k.startsWith(exId + '-')).length;
      volumeKg += kg * setsDone * (WS.reps[exId] ?? 10);
    }
  });

  const effectiveSecs = Math.max(WS.sessionSecs, totalSetsDone * 60);
  const aerobic = avgMet * weightKg * 3.5 / 200 * (effectiveSecs / 60);
  const calories = Math.round(aerobic + volumeKg / 60);

  const bodyParts = [...new Set(exs.map(e => e.exercise?.body_part).filter(Boolean))];

  const session = {
    id: WS._startTs || Date.now(),
    date: new Date().toISOString().slice(0,10),
    dayOfWeek: WS.day,
    dayLabel: dayInfo?.label || '',
    durationSecs: WS.sessionSecs,
    exerciseCount: exs.length,
    setsDone: Object.keys(WS.done).length,
    calories,
    volumeKg: Math.round(volumeKg),
    bodyParts,
  };
  const sessions = safeLS('fit_sessions');
  if (!sessions.find(s => s.id === session.id)) {
    sessions.unshift(session);
    if (sessions.length > 100) sessions.splice(100);
    localStorage.setItem('fit_sessions', JSON.stringify(sessions));
  }
}

function wsEndWorkout() {
  wsSaveSession();
  WS.started = false; WS.mode = 'idle'; WS.running = false;
  WS.done = {}; WS.sessionSecs = 0; WS.elapsed = 0; WS._startTs = null;
  stopWsTick();
  renderWorkoutView();
}

function wsDecSets(id) { WS.sets[id] = Math.max((WS.sets[id] ?? 3) - 1, 1); wsSavePrefs(); renderWorkoutView(); }
function wsIncReps(id) { WS.reps[id] = Math.min((WS.reps[id] ?? 10) + 1, 30); wsSavePrefs(); renderWorkoutView(); }
function wsDecReps(id) { WS.reps[id] = Math.max((WS.reps[id] ?? 10) - 1, 1); wsSavePrefs(); renderWorkoutView(); }
function wsIncWeight(id, step) { WS.weights[id] = Math.round(((WS.weights[id] ?? 0) + step) * 4) / 4; wsSavePrefs(); renderWorkoutView(); }
function wsDecWeight(id, step) { WS.weights[id] = Math.max(0, Math.round(((WS.weights[id] ?? 0) - step) * 4) / 4); wsSavePrefs(); renderWorkoutView(); }

// ── Streak ────────────────────────────────────────────────────────────────────
// Counts consecutive plan-days (dayOfWeek) trained this week, Mon→Sun order.
// Using plan days (not calendar dates) so testing multiple workouts same day works.
function wsGetStreak() {
  const sessions = safeLS('fit_sessions');
  if (!sessions.length) return 0;

  // Current week bounds (Mon 00:00 → Sun 23:59)
  const now = new Date();
  const dow = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0, 0, 0, 0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);

  const weekSessions = sessions.filter(s => {
    const d = new Date(s.date + 'T12:00:00');
    return d >= monday && d <= sunday;
  });
  if (!weekSessions.length) return 0;

  // Unique plan days trained this week (Mon=1..Sat=6,Sun=0)
  const trainedDays = new Set(weekSessions.map(s => s.dayOfWeek));

  // Walk Mon→Sun; find latest trained day, then count consecutive going back
  const weekOrder = [1, 2, 3, 4, 5, 6, 0];
  let latestIdx = -1;
  for (let i = weekOrder.length - 1; i >= 0; i--) {
    if (trainedDays.has(weekOrder[i])) { latestIdx = i; break; }
  }
  if (latestIdx < 0) return 0;

  let streak = 0;
  for (let i = latestIdx; i >= 0; i--) {
    if (trainedDays.has(weekOrder[i])) streak++;
    else break;
  }
  return streak;
}

// ── Progression chart ─────────────────────────────────────────────────────────
function wsProgressionChart(exId) {
  const log = safeLS('fit_weight_log');
  const entries = log.filter(e => String(e.exId) === String(exId));
  if (!entries.length) return '';
  const byDate = {};
  entries.forEach(e => { if (!byDate[e.date] || e.weight > byDate[e.date]) byDate[e.date] = e.weight; });
  const pts = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).slice(-10);
  if (pts.length < 2) {
    const onlyW = pts[0]?.[1] ?? entries[entries.length-1].weight;
    return `<div style="margin-top:11px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;">
      <span style="font:700 11px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.04em;">Última carga</span>
      <span style="font:800 14px Manrope;color:var(--accent-strong);">${onlyW} kg</span>
    </div>`;
  }
  const weights = pts.map(p => p[1]);
  const minW = Math.min(...weights), maxW = Math.max(...weights);
  const range = maxW - minW || 1;
  const W = 260, H = 52, pad = 6;
  const xs = pts.map((_, i) => pad + (i / (pts.length - 1)) * (W - pad * 2));
  const ys = weights.map(w => H - pad - ((w - minW) / range) * (H - pad * 2));
  const poly = xs.map((x,i) => `${x},${ys[i]}`).join(' ');
  const area = `${xs[0]},${H} ` + xs.map((x,i) => `${x},${ys[i]}`).join(' ') + ` ${xs[xs.length-1]},${H}`;
  const dotId = `wc${exId}`;
  const dots = xs.map((x,i) => `<circle cx="${x}" cy="${ys[i]}" r="2.8" fill="var(--accent)"><title>${weights[i]}kg</title></circle>`).join('');
  return `<div style="margin-top:11px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font:700 11px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.04em;">Evolução</span>
      <span style="font:800 12px Manrope;color:var(--accent-strong);">${maxW} kg máx</span>
    </div>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible;">
      <defs><linearGradient id="${dotId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity=".22"></stop>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"></stop>
      </linearGradient></defs>
      <polygon points="${area}" fill="url(#${dotId})"></polygon>
      <polyline points="${poly}" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"></polyline>
      ${dots}
    </svg>
  </div>`;
}

                oninput="wsSetWeight('${ex.id}', this.value)"
                style="width:56px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.16);background:#1C1C1E;color:#F2F2F4;font:800 15px Manrope;text-align:center;outline:none;padding:0;">

          </div>
        </div>
      </div>
      ${(()=>{try{return wsProgressionChart(ex.id);}catch(e){console.error('chart',e);return '';}})()}
    </div>`;
  }).join('');

  g('main').innerHTML = `
  <div style="max-width:760px;margin:0 auto;padding:clamp(20px,3vw,32px) 0 72px;">
    <div style="margin-bottom:20px;">
      <h1 style="margin:0;font:800 clamp(24px,3vw,30px) Manrope;letter-spacing:-.02em;color:#F7F7F6;">Treinar</h1>

    ${hasEx ? `<div>

        <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 22px Manrope;color:#F2F2F4;">${exs.length}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">exercícios</div></div>
        <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 22px Manrope;color:#F2F2F4;">${totalSets}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">séries</div></div>
        <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 22px Manrope;color:#F2F2F4;">~${estMin}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">minutos</div></div>

      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);">

function wsGetDashboardHTML() {
  const sessions = safeLS('fit_sessions');

  // Week bounds (Mon–Sun)
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  monday.setHours(0,0,0,0);

  const todayStr = now.toISOString().slice(0,10);
  const weekSessions = sessions.filter(s => {
    const d = new Date(s.date + 'T12:00:00');
    const mon = new Date(monday); mon.setHours(0,0,0,0);
    const sun = new Date(monday); sun.setDate(monday.getDate()+6); sun.setHours(23,59,59,999);
    return d >= mon && d <= sun;
  });

  const weekWorkouts = weekSessions.length;
  const weekSets = weekSessions.reduce((a, s) => a + s.setsDone, 0);
  const weekSecs = weekSessions.reduce((a, s) => a + s.durationSecs, 0);
  const weekCalories = weekSessions.reduce((a, s) => a + (s.calories || 0), 0);

  const muscleCount = {};
  weekSessions.forEach(s => (s.bodyParts||[]).forEach(bp => { muscleCount[bp] = (muscleCount[bp]||0)+1; }));
  const weekMuscles = Object.entries(muscleCount).sort((a,b)=>b[1]-a[1]);

  // Heatmap: Mon(1)→Sun(0)
  const heatmap = WEEK.map(d => {
    const offset = d.key === 0 ? 6 : d.key - 1;
    const date = new Date(monday);
    date.setDate(monday.getDate() + offset);
    const dateStr = date.toISOString().slice(0,10);
    const trained = sessions.some(s => s.date === dateStr);
    const isToday = dateStr === todayStr;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <span style="font:700 11px Manrope;color:${isToday?'var(--accent-strong)':'#7C7C82'};text-transform:uppercase;letter-spacing:.03em;">${d.label.slice(0,3)}</span>
      <span style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:${trained?'var(--accent-soft)':'rgba(255,255,255,.04)'};border:1px solid ${trained?'color-mix(in srgb,var(--accent) 35%,transparent)':'rgba(255,255,255,.07)'};">
        ${trained?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>`:`<span style="width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.14);"></span>`}
      </span>
    </div>`;
  }).join('');

  const recent = sessions.slice(0,5).map(s => {
    const d = new Date(s.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('pt-BR', {day:'numeric', month:'short'});
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:#121214;border:1px solid rgba(255,255,255,.06);">
      <span style="flex:none;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--accent)"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"></path></svg></span>
      <div style="flex:1;min-width:0;">
        <p style="margin:0;font:700 13.5px Manrope;color:#DCDCE0;">${s.dayLabel} <span style="color:#7C7C82;font-weight:600;font-size:12px;">· ${dateStr}</span></p>
        <p style="margin:3px 0 0;color:#7C7C82;font-size:12px;">${s.exerciseCount} exercícios · ${s.setsDone} séries${s.calories ? ` · ~${s.calories} kcal` : ''}</p>
      </div>
      <span style="color:#9A9AA0;font:700 13px Manrope;white-space:nowrap;flex-shrink:0;">${wsFmt(s.durationSecs)}</span>
    </div>`;
  }).join('');

  const streak = wsGetStreak();
  const streakBanner = streak > 0 ? `<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:16px;background:linear-gradient(135deg,rgba(240,83,28,.14),rgba(240,83,28,.06));border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);margin-bottom:12px;">
    <span style="font-size:30px;line-height:1;flex-shrink:0;">🔥</span>
    <div style="flex:1;min-width:0;">
      <span style="font-family:Anton,sans-serif;font-size:28px;color:#F7F7F6;line-height:1;letter-spacing:.02em;">${streak}</span><span style="color:#9A9AA0;font:700 13px Manrope;margin-left:6px;">${streak === 1 ? 'dia' : 'dias'} seguidos</span>
      <p style="margin:3px 0 0;color:#7C7C82;font:600 12px Manrope;">${streak >= 7 ? 'Semana perfeita! Incrível.' : streak >= 5 ? 'Quase lá, não para agora!' : streak >= 3 ? 'Bom ritmo, continue!' : 'Começo de algo grande!'}</p>
    </div>
  </div>` : '';

  return `
  <div style="margin-top:36px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
      <span style="font:700 11.5px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.06em;">Esta semana</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
    </div>
    ${streakBanner}
    <div style="display:grid;grid-template-columns:${weekCalories > 0 ? 'repeat(4,1fr)' : 'repeat(3,1fr)'};gap:10px;margin-bottom:12px;">
      <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 24px Manrope;color:#F2F2F4;">${weekWorkouts}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">treinos</div></div>
      <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 24px Manrope;color:#F2F2F4;">${weekSets}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">séries</div></div>
      <div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 24px Manrope;color:#F2F2F4;">${wsFmt(weekSecs)}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">tempo</div></div>
      ${weekCalories > 0 ? `<div style="padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font:800 24px Manrope;color:#F0531C;">~${weekCalories}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">kcal</div></div>` : ''}
    </div>
    <div style="display:flex;justify-content:space-between;gap:4px;padding:14px 16px;border-radius:14px;background:#121214;border:1px solid rgba(255,255,255,.07);margin-bottom:${weekMuscles.length||sessions.length?'12px':'0'};">${heatmap}</div>
    ${weekMuscles.length?`<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;">
      ${weekMuscles.map(([bp,cnt])=>{const c=grp(bp);return `<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:9px;background:${c.soft};color:${c.color};font-size:12px;font-weight:700;border:1px solid ${c.color}22;">${tPart(bp)}<span style="opacity:.6;font-weight:600;font-size:10.5px;">${cnt}×</span></span>`;}).join('')}
    </div>`:''}

    ${(()=>{
      const wlog = safeLS('fit_weight_log');
      if (!wlog.length) return '';
      const byEx = {};
      wlog.forEach(e=>{
        if (!byEx[e.exId]) byEx[e.exId]={name:e.exName,dates:{}};
        if (!byEx[e.exId].dates[e.date]||e.weight>byEx[e.exId].dates[e.date]) byEx[e.exId].dates[e.date]=e.weight;
      });
      const cards = Object.entries(byEx)
        .map(([exId,{name,dates}])=>{
          const pts=Object.keys(dates).sort().slice(-10).map(d=>({d,w:dates[d]}));
          return {exId,name,pts};
        })
        .filter(x=>x.pts.length>=1)
        .sort((a,b)=>b.pts[b.pts.length-1].w-a.pts[a.pts.length-1].w)
        .slice(0,4);
      if (!cards.length) return '';
      return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
        <span style="font:700 11.5px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.06em;">Progresso de carga</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px;">
        ${cards.map(({exId,name,pts})=>{
          const first=pts[0].w, last=pts[pts.length-1].w;
          const diff=last-first;
          const diffStr=diff>0?`+${diff.toFixed(1)}`:(diff<0?diff.toFixed(1):'');
          const diffColor=diff>0?'#4CAF50':diff<0?'#F44336':'#7C7C82';
          const chart=pts.length>=2?_sparkline(pts.map(p=>p.w),200,40):'';
          const sinceLabel=pts.length<2?`<span style="color:#5C5C62;font:600 11px Manrope;">primeiro registro</span>`:`<span style="color:${diffColor};font:700 11px Manrope;">${diffStr} kg</span>`;
          return `<div onclick="openAssign('${exId}')" style="display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:13px;background:#121214;border:1px solid rgba(255,255,255,.06);cursor:pointer;" onmouseover="this.style.borderColor='rgba(255,255,255,.14)'" onmouseout="this.style.borderColor='rgba(255,255,255,.06)'">
            <div style="flex:1;min-width:0;">
              <p style="margin:0;font:600 13px Manrope;color:#DCDCE0;text-transform:capitalize;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${name}</p>
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                <span style="color:var(--accent);font:700 15px Manrope;">${last} kg</span>
                ${sinceLabel}
              </div>
            </div>
            ${chart?`<div style="flex:none;">${chart}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    })()}

    ${sessions.length ? `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
      <span style="font:700 11.5px Manrope;color:#7C7C82;text-transform:uppercase;letter-spacing:.06em;">Histórico</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07);"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">${recent}</div>` : ''}
  </div>`;
}

function renderWorkoutActive() {
  const exs = wsExsForDay(WS.day);
  const curEntry = exs[WS.curIdx];
  if (!curEntry) { renderWorkoutDone(); return; }
  const curEx = curEntry.exercise;
  const c = grp(curEx.body_part);
  const totalSets = wsGetSets(curEx.id);
  const isWork = WS.mode === 'work';
  const isRest = WS.mode === 'rest';
  const allSets = exs.reduce((a, e) => a + wsGetSets(e.exercise.id), 0);
  const completedAll = Object.keys(WS.done).length;
  const progressPct = Math.round(completedAll / Math.max(allSets, 1) * 100);

  let subLabel = '';
  if (isWork) subLabel = `Série ${WS.curSet} de ${totalSets} · ${wsGetReps(curEx.id)} reps`;
  else if (WS.curSet < totalSets) subLabel = `Próxima: Série ${WS.curSet + 1} de ${totalSets}`;
  else if (WS.curIdx < exs.length - 1) subLabel = `Próximo: ${exName(exs[WS.curIdx + 1].exercise)}`;

  const circ = 628;
  const ringOffset = isRest ? Math.round(circ * (1 - WS.restLeft / Math.max(WS.rest, 1))) : 0;

  const setDots = Array.from({length: totalSets}, (_, k) => {
    const done = (k + 1 < WS.curSet) || (k + 1 === WS.curSet && isRest);
    const current = k + 1 === WS.curSet && isWork;
    const bg = done ? c.color : (current ? 'rgba(255,255,255,.45)' : 'rgba(255,255,255,.1)');
    return `<span style="width:34px;height:8px;border-radius:999px;background:${bg};transition:background .2s;"></span>`;
  }).join('');

  const miniList = exs.map((entry, i) => {
    const ex = entry.exercise;
    const sets = wsGetSets(ex.id);
    const doneCount = Array.from({length: sets}).filter((_, k) => WS.done[ex.id + '-' + (k+1)]).length;
    const isCur = i === WS.curIdx;
    const full = doneCount >= sets;
    const ec = grp(ex.body_part);
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:${isCur?'var(--accent-soft)':'#121214'};border:1px solid ${isCur?'color-mix(in srgb,var(--accent) 35%,transparent)':'rgba(255,255,255,.06)'};">
      <span style="flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${full?'#16A34A':(isCur?ec.color:'rgba(255,255,255,.06)')};color:${(full||isCur)?'#fff':'#9A9AA0'};font:800 13px Manrope;">${full?'✓':(i+1)}</span>
      <span style="flex:1;min-width:0;font:600 14px Manrope;color:${isCur?'#F2F2F4':'#C4C4C8'};text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${exName(ex)}</span>
      <span style="color:#8A8A90;font:700 13px Manrope;">${doneCount}/${sets}</span>
    </div>`;
  }).join('');

  g('main').innerHTML = `
  <div style="max-width:760px;margin:0 auto;padding:clamp(20px,3vw,32px) 0 72px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;">
      <button onclick="wsEndWorkout()" style="display:flex;align-items:center;gap:6px;background:none;border:none;color:#9A9AA0;font:600 13.5px Manrope;cursor:pointer;" onmouseover="this.style.color='#F87171'" onmouseout="this.style.color='#9A9AA0'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"></path></svg>Encerrar</button>
      <span style="color:#9A9AA0;font:700 13px Manrope;">${wsFmt(WS.sessionSecs)} · ${completedAll}/${allSets} séries</span>
    </div>
    <div style="height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin-bottom:22px;">
      <div style="height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent-strong),var(--accent-deep));width:${progressPct}%;transition:width .3s;"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 20px;border-radius:24px;background:linear-gradient(180deg,#161618,#0F0F11);border:1px solid ${isRest?'rgba(255,255,255,.1)':'color-mix(in srgb,'+c.color+' 30%,transparent)'};">
      <span style="display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:999px;background:${isWork?c.soft:'rgba(255,255,255,.06)'};color:${isWork?c.color:'#9A9AA0'};font:800 12.5px Manrope;letter-spacing:.04em;text-transform:uppercase;">${isWork?'Em execução':'Descanso'}</span>
      <h2 style="margin:14px 0 2px;font:800 20px Manrope;color:#F7F7F6;text-transform:capitalize;">${exName(curEx)}</h2>
      <p style="margin:0;color:#9A9AA0;font-size:13.5px;">${subLabel}</p>
      <div style="position:relative;width:230px;height:230px;margin:18px 0 8px;">
        <svg width="230" height="230" viewBox="0 0 230 230" style="position:absolute;inset:0;">
          <circle cx="115" cy="115" r="100" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="11"></circle>
          <circle cx="115" cy="115" r="100" fill="none" stroke="${c.color}" stroke-width="11" stroke-linecap="round" transform="rotate(-90 115 115)" stroke-dasharray="628" stroke-dashoffset="${ringOffset}" style="transition:stroke-dashoffset .9s linear;"></circle>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span style="font-family:Anton,sans-serif;font-size:54px;color:#F7F7F6;line-height:1;letter-spacing:.01em;">${isWork?wsFmt(WS.elapsed):wsFmt(WS.restLeft)}</span>
          <span style="margin-top:6px;color:#7C7C82;font:700 12px Manrope;text-transform:uppercase;letter-spacing:.06em;">${isWork?'tempo da série':'descanso'}</span>
        </div>
      </div>
      <div style="display:flex;gap:10px;width:100%;max-width:380px;margin-top:6px;">
        <button onclick="wsToggleRun()" style="flex:1;height:52px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#EDEDED;font:700 15px Manrope;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='transparent'">${WS.running?'Pausar':'Retomar'}</button>
        ${isWork ? `<button onclick="wsCompleteSet()" style="flex:1.4;height:52px;border-radius:13px;border:none;color:#fff;font:800 15px Manrope;cursor:pointer;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 30px -12px color-mix(in srgb,var(--accent) 65%,transparent);" onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter=''"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>Concluir série</button>` :
        `<button onclick="wsAddRest()" style="flex:1;height:52px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#EDEDED;font:700 15px Manrope;cursor:pointer;">+15s</button>
        <button onclick="wsSkipRest()" style="flex:1.2;height:52px;border-radius:13px;border:none;color:#fff;font:800 15px Manrope;cursor:pointer;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));display:flex;align-items:center;justify-content:center;gap:7px;" onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter=''">Pular<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l10 8-10 8zM17 5h3v14h-3z"></path></svg></button>`}
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;">${setDots}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:24px;">${miniList}</div>
  </div>`;
}

function renderWorkoutDone() {
  const exs = wsExsForDay(WS.day);
  const doneSets = Object.keys(WS.done).length;

  const mets = exs.map(e => WS._insights[e.exercise?.id]?.calories_per_min_met || 3.5);
  const avgMet = mets.reduce((a, b) => a + b, 0) / (mets.length || 1);
  const weightKg = S.user?.weight_kg;
  const totalSetsDone = Object.keys(WS.done).length;

  let volumeKg = 0;
  Object.entries(WS.weights).forEach(([exId, kg]) => {
    if (kg > 0) {
      const setsDone = Object.keys(WS.done).filter(k => k.startsWith(exId + '-')).length;
      volumeKg += kg * setsDone * (WS.reps[exId] ?? 10);
    }
  });
  volumeKg = Math.round(volumeKg);

  const effectiveSecs = Math.max(WS.sessionSecs, totalSetsDone * 60);
  const aerobic = weightKg ? avgMet * weightKg * 3.5 / 200 * (effectiveSecs / 60) : 0;
  const calories = Math.round(aerobic + volumeKg / 60);

  const bodyParts = [...new Set(exs.map(e => e.exercise?.body_part).filter(Boolean))];
  const partChips = bodyParts.map(p => {
    const c = grp(p);
    return `<span style="padding:5px 12px;border-radius:9px;background:${c.soft};color:${c.color};font-size:12.5px;font-weight:700;border:1px solid ${c.color}33;">${tPart(p)}</span>`;
  }).join('');

  const calTile = calories > 0
    ? `<div style="padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font-family:Anton,sans-serif;font-size:30px;color:#F0531C;">~${calories}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">kcal</div></div>`
    : '';
  const volTile = volumeKg > 0
    ? `<div style="padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;">${volumeKg}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">kg vol.</div></div>`
    : '';
  const noWeightNote = (!weightKg && calories === 0)
    ? `<p style="margin:12px 0 0;color:#7C7C82;font-size:12.5px;">Configure seu peso em Ajustes para ver as calorias.</p>`
    : '';

  g('main').innerHTML = `
  <div style="max-width:760px;margin:0 auto;padding:clamp(20px,3vw,32px) 0 72px;">
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 20px;animation:voltPop .4s ease both;">
      <span style="width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#22C55E,#16A34A);box-shadow:0 18px 44px -14px rgba(34,197,94,.6);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </span>
      <h1 style="margin:22px 0 0;font:800 28px Manrope;letter-spacing:-.02em;color:#F7F7F6;">Treino concluído!</h1>
      <p style="margin:8px 0 0;color:#9A9AA0;font-size:15px;">Mandou bem, ${S.user?.name||'atleta'}. Bora repetir amanhã.</p>
      <div style="display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center;">
        <div style="padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;">${doneSets}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">séries</div></div>
        <div style="padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;">${exs.length}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">exercícios</div></div>
        <div style="padding:16px 22px;border-radius:16px;background:#121214;border:1px solid rgba(255,255,255,.07);"><div style="font-family:Anton,sans-serif;font-size:30px;color:#F2F2F4;">${wsFmt(WS.sessionSecs)}</div><div style="color:#7C7C82;font-size:12px;font-weight:600;margin-top:2px;">tempo</div></div>
        ${calTile}${volTile}
      </div>
      ${bodyParts.length ? `<div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px;">${partChips}</div>` : ''}
      ${noWeightNote}
      <button onclick="wsEndWorkout()" style="margin-top:30px;height:52px;padding:0 28px;border:none;border-radius:14px;cursor:pointer;color:#fff;font:800 15.5px Manrope;background:linear-gradient(180deg,var(--accent-strong),var(--accent-deep));box-shadow:0 14px 36px -12px color-mix(in srgb,var(--accent) 65%,transparent);" onmouseover="this.style.filter='brightness(1.06)'" onmouseout="this.style.filter=''">Finalizar</button>
    </div>
  </div>`;
}
