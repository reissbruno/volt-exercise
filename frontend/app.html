// AUTH — VOLT exact design
// ══════════════════════════════════════════════════════════════════════════════

const _VI=`<svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent)"><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z"></path></svg>`;
const _VEY=`<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
const _VEYF=`<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"></path></svg>`;
const _VLK=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
const _VBA=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"></path></svg>`;
let _vpw=false;

function showAuthPage(tab='welcome') {
  g('app').classList.add('hidden');
  g('auth-root').innerHTML='';
  _voltShell();
  if(tab==='login') _voltLogin();
  else if(tab==='register') _voltSignup();
  else _voltWelcome();
}

function _voltShell() {
  g('auth-root').innerHTML=`
    <div class="volt-auth-page">
      <div class="volt-glow"></div><div class="volt-vignette"></div>
      <div class="volt-card">
        <button class="volt-back hidden" id="volt-back" onclick="showAuthPage()">${_VBA} Voltar</button>
        <div class="volt-logo-row" style="justify-content:center;"><img src="logo-volt.png" alt="VOLT" style="height:40px;width:auto;object-fit:contain;"><span style="font-family:Anton,sans-serif;font-size:26px;letter-spacing:.05em;color:#F7F7F6;line-height:1;">VOLT</span></div>
        <div id="volt-content"></div>
      </div>
    </div>`;
}

function _voltWelcome() {
  g('volt-back').classList.add('hidden');
  g('volt-content').innerHTML=`
    <p class="volt-tagline">Exercícios guiados, planos semanais e progressão real — tudo em um só treino.</p>
    <div class="volt-stats"><span><span class="volt-stats-hi">1.324+</span> <span class="volt-stats-lo">exercícios</span></span><span class="volt-stats-dot"></span><span><span class="volt-stats-hi">Planos</span> <span class="volt-stats-lo">semanais</span></span></div>
    <div class="volt-btn-col"><button class="volt-btn-primary" onclick="_voltLogin()">Entrar</button><button class="volt-btn-secondary" onclick="_voltSignup()">Criar conta</button></div>
    <div class="volt-lock-row">${_VLK} Seus dados ficam apenas neste dispositivo.</div>`;
}

function _voltLogin() {
  _vpw=false; g('volt-back').classList.remove('hidden');
  g('volt-content').innerHTML=`
    <div class="volt-form-head"><h1>Bem-vindo de volta</h1><p>Continue de onde você parou.</p></div>
    <form class="volt-form" onsubmit="doLogin();return false;">
      <div class="volt-field"><label class="volt-label">Email</label><input class="volt-input" id="ae" type="email" placeholder="seu@email.com" autocomplete="email" autofocus></div>
      <div class="volt-field"><label class="volt-label">Senha</label><div class="volt-pw-wrap"><input class="volt-input volt-input-pw" id="ap" type="password" placeholder="••••••••" autocomplete="current-password"><button type="button" class="volt-pw-toggle" onclick="_voltTogglePw()"><span id="vpwi">${_VEY}</span></button></div><a href="#" class="volt-forgot" onclick="return false;">Esqueceu a senha?</a></div>
      <div class="volt-form-err" id="aerr"></div>
      <button type="submit" class="volt-btn-primary" style="margin-top:4px">Entrar</button>
    </form>
    <div class="volt-switch">Ainda não tem conta? <button class="volt-switch-btn" onclick="_voltSignup()">Criar conta</button></div>`;
}

function _voltSignup() {
  _vpw=false; _regSex=''; g('volt-back').classList.remove('hidden');
  g('volt-content').innerHTML=`
    <div class="volt-form-head"><h1>Criar conta</h1><p>Comece sua jornada de treino hoje.</p></div>
    <form class="volt-form" onsubmit="doRegister();return false;">
      <div class="volt-field"><label class="volt-label">Nome</label><input class="volt-input" id="an" type="text" placeholder="Seu nome" autocomplete="name" autofocus></div>
      <div class="volt-field"><label class="volt-label">Email</label><input class="volt-input" id="ae" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="volt-field"><label class="volt-label">Senha</label><div class="volt-pw-wrap"><input class="volt-input volt-input-pw" id="ap" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"><button type="button" class="volt-pw-toggle" onclick="_voltTogglePw()"><span id="vpwi">${_VEY}</span></button></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="volt-field"><label class="volt-label">Peso (kg) <span style="color:#7A7A80;font-weight:400;font-size:10px;">opcional</span></label><input class="volt-input" id="aw" type="number" placeholder="75" min="30" max="400" step="0.1"></div>
        <div class="volt-field"><label class="volt-label">Altura (cm) <span style="color:#7A7A80;font-weight:400;font-size:10px;">opcional</span></label><input class="volt-input" id="ah" type="number" placeholder="175" min="50" max="280"></div>
      </div>
      <div class="volt-field"><label class="volt-label">Idade <span style="color:#7A7A80;font-weight:400;font-size:10px;">opcional</span></label><input class="volt-input" id="aage" type="number" placeholder="25" min="10" max="120"></div>
      <div class="volt-field">
        <label class="volt-label">Sexo <span style="color:#7A7A80;font-weight:400;font-size:10px;">opcional</span></label>
        <div style="display:flex;gap:8px;">
          <button type="button" id="rsex-m" onclick="_selRegSex('m')" style="flex:1;height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:#F5F5F4;font:600 13px Manrope;cursor:pointer;transition:all .15s;">Masculino</button>
          <button type="button" id="rsex-f" onclick="_selRegSex('f')" style="flex:1;height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:#F5F5F4;font:600 13px Manrope;cursor:pointer;transition:all .15s;">Feminino</button>
          <button type="button" id="rsex-o" onclick="_selRegSex('o')" style="flex:1;height:52px;border-radius:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:#F5F5F4;font:600 13px Manrope;cursor:pointer;transition:all .15s;">Outro</button>
        </div>
      </div>
      <div class="volt-form-err" id="aerr"></div>
      <button type="submit" class="volt-btn-primary" style="margin-top:4px">Criar conta</button>
    </form>
    <div class="volt-switch">Já tem conta? <button class="volt-switch-btn" onclick="_voltLogin()">Entrar</button></div>
    <p class="volt-tos">Ao criar uma conta, você concorda com os<br><a href="#" style="color:#7A7A80;" onclick="return false;">Termos de Uso</a> e <a href="#" style="color:#7A7A80;" onclick="return false;">Política de Privacidade</a>.</p>`;
}

function _voltTogglePw() { _vpw=!_vpw; const i=g('ap'); if(i) i.type=_vpw?'text':'password'; const ic=g('vpwi'); if(ic) ic.innerHTML=_vpw?_VEYF:_VEY; }
function showAuth(tab) { showAuthPage(tab==='register'?'register':'login'); }
function _selRegSex(v) {
  _regSex = _regSex === v ? '' : v;
  ['m','f','o'].forEach(s => {
    const btn = g('rsex-'+s);
    if (!btn) return;
    const sel = s === _regSex;
    btn.style.borderColor = sel ? 'var(--accent)' : 'rgba(255,255,255,.09)';
    btn.style.background  = sel ? 'var(--accent-soft)' : 'rgba(255,255,255,.04)';
    btn.style.color       = sel ? 'var(--accent-strong)' : '#F5F5F4';
  });
}

async function doLogin() {
  const btn=document.querySelector('.volt-form .volt-btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Entrando…';}
  try {
    const d=await api('/auth/login',{method:'POST',body:JSON.stringify({email:g('ae').value,password:g('ap').value})});
    setAuth(d.token,d.user); toast(`Bem-vindo, ${d.user.name}!`); await enterApp();
  } catch(e) { if(g('aerr'))g('aerr').textContent=e.message; if(btn){btn.disabled=false;btn.textContent='Entrar';} }
}

async function doRegister() {
  const btn=document.querySelector('.volt-form .volt-btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Criando…';}
  try {
    const body = {name:g('an').value, email:g('ae').value, password:g('ap').value};
    const w = parseFloat(g('aw')?.value); if (!isNaN(w) && w > 0) body.weight_kg = w;
    const h = parseFloat(g('ah')?.value); if (!isNaN(h) && h > 0) body.height_cm = h;
    const a = parseInt(g('aage')?.value);  if (!isNaN(a) && a > 0) body.age = a;
    if (_regSex) body.sex = _regSex;
    const d=await api('/auth/register',{method:'POST',body:JSON.stringify(body)});
    setAuth(d.token,d.user); toast(`Bem-vindo, ${d.user.name}!`); await enterApp();
  } catch(e) { if(g('aerr'))g('aerr').textContent=e.message; if(btn){btn.disabled=false;btn.textContent='Criar conta';} }
}

function logout() { clearAuth(); S.plan=null; g('auth-root').innerHTML=''; showAuthPage(); }

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════

async function enterApp() {
  g('auth-root').innerHTML=''; g('app').classList.remove('hidden');
  S.view='exercises'; renderHeader();
  const proms = [loadMeta(), loadExercises(1)];
  if (S.user) proms.push(ensurePlan());
  await Promise.all(proms);
  renderExsView();
  renderHeader();
}

async function init() {
  if (S.token && S.user) {
    try { await enterApp(); }
    catch(e) {
      if (!S.token) { /* already redirected to auth by api() */ }
      else {
        g('app').classList.add('hidden');
        g('auth-root').innerHTML=`
          <div class="volt-auth-page"><div class="volt-glow"></div><div class="volt-vignette"></div>
            <div class="volt-card" style="text-align:center">
              <div class="volt-logo-row" style="margin-bottom:12px;justify-content:center;"><img src="logo-volt.png" alt="VOLT" style="height:40px;width:auto;object-fit:contain;"><span style="font-family:Anton,sans-serif;font-size:26px;letter-spacing:.05em;color:#F7F7F6;line-height:1;">VOLT</span></div>
              <div style="font-size:32px;margin:12px 0">⚠️</div>
              <div style="font:700 16px Manrope;color:#F7F7F6;margin-bottom:8px">Servidor não encontrado</div>
              <p style="color:#9A9AA0;font-size:14px;margin-bottom:16px">Não foi possível conectar ao servidor.<br>Tente recarregar a página.</p>
              <button class="volt-btn-primary" onclick="init()">Tentar novamente</button>
            </div>
          </div>`;
      }
    }
  } else { showAuthPage(); }
}

init();
</script>
